name: Core tests

on:
  push:
    branches: [main]
    paths:
      - "Core/**"
      - ".github/workflows/core-tests.yml"
  pull_request:
    paths:
      - "Core/**"
      - ".github/workflows/core-tests.yml"

jobs:
  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # HydeTests.testFetch hits the live hyde.dk network, so CI runs only
      # the offline test targets.
      - name: Run offline tests
        working-directory: Core
        run: swift test --filter 'ParserTests|DomainTypesTests|CacheTests'
